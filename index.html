<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2026 창원교육장배 배드민턴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;
  --accent:#00d4ff;--accent2:#ff6b35;--gold:#ffd700;--silver:#c0c0c0;
  --bronze:#cd7f32;--text:#e2e8f0;--muted:#64748b;--win:#22c55e;--lose:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overscroll-behavior:none;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(255,107,53,.06) 0%,transparent 50%)}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;
  background:var(--surface);border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.topbar-title{font-size:.82rem;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-status{display:flex;align-items:center;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--win)}.sdot.spin{background:var(--accent);animation:sdotblink 1s infinite}.sdot.err{background:var(--lose)}
@keyframes sdotblink{0%,100%{opacity:1}50%{opacity:.25}}
.mode-badge{font-size:.75rem;padding:3px 10px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted)}
.mode-badge.admin{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.08)}
.mode-badge.team{color:var(--accent2);border-color:var(--accent2);background:rgba(255,107,53,.08)}
.btn-sm{font-size:.75rem;padding:4px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.danger:hover{border-color:var(--lose);color:var(--lose)}

/* ── PIN OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(10,14,26,.93);display:flex;align-items:center;
  justify-content:center;z-index:999;backdrop-filter:blur(6px)}
.overlay.hidden{display:none}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:28px 24px;width:min(320px,90vw);text-align:center;box-shadow:0 0 40px rgba(0,212,255,.12)}
.pin-box h2{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;margin-bottom:4px;letter-spacing:1px}
.pin-box .pin-sub{font-size:.78rem;color:var(--muted);margin-bottom:18px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(0,212,255,.5)}
.pin-dot.error{background:var(--lose);border-color:var(--lose)}
.pin-dot.team-filled{background:var(--accent2);border-color:var(--accent2);box-shadow:0 0 8px rgba(255,107,53,.5)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:'Black Han Sans',sans-serif;font-size:1.1rem;cursor:pointer;
  transition:all .15s;user-select:none}
.key:hover{background:rgba(0,212,255,.1);border-color:var(--accent)}
.key:active{transform:scale(.94)}
.key.del{color:var(--muted);font-size:.82rem}
.key.zero{grid-column:2}
.pin-error{font-size:.75rem;color:var(--lose);margin-top:10px;min-height:16px}
.pin-cancel{margin-top:12px;font-size:.78rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline}
.pin-cancel:hover{color:var(--text)}
.login-select{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.login-opt{display:block;width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all .2s;text-align:left;
  font-family:'Noto Sans KR',sans-serif;color:var(--text);margin-bottom:0}
.login-opt:hover,.login-opt:active{border-color:var(--accent)}
.login-opt .opt-title{font-size:.88rem;font-weight:700;margin-bottom:2px}
.login-opt .opt-sub{font-size:.72rem;color:var(--muted)}

/* ── HEADER ── */
header{text-align:center;padding:22px 20px 14px;border-bottom:1px solid var(--border)}
header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.2rem,4vw,1.8rem);letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);font-size:.78rem;margin-top:4px}
.container{max-width:960px;margin:0 auto;padding:18px 14px}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--surface);padding:5px;
  border-radius:12px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:.78rem;
  font-weight:500;transition:all .2s;color:var(--muted);border:none;background:transparent}
.tab.active{background:linear-gradient(135deg,var(--accent),#0099bb);color:#fff;box-shadow:0 0 14px rgba(0,212,255,.25)}
.tab.hidden{display:none}
.panel{display:none}.panel.active{display:block}
.sec-title{font-family:'Black Han Sans',sans-serif;font-size:.95rem;letter-spacing:1px;color:var(--accent);
  margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* ── SETUP ── */
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:560px){.setup-grid{grid-template-columns:1fr}}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.setup-card h3{font-size:.8rem;color:var(--muted);margin-bottom:10px;font-weight:500}
.count-row{display:flex;align-items:center;gap:10px}
.count-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.count-btn:hover{border-color:var(--accent);color:var(--accent)}
.count-num{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:var(--accent);min-width:28px;text-align:center}
.team-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.team-row{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:7px 10px;transition:border-color .2s}
.team-row:focus-within{border-color:var(--accent)}
.team-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;flex-shrink:0}
.team-row input{background:transparent;border:none;outline:none;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-size:.85rem;flex:1}
.pin-display{font-family:'Black Han Sans',sans-serif;font-size:.88rem;color:var(--accent);
  background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:6px;
  padding:2px 8px;min-width:48px;text-align:center;cursor:pointer;transition:all .15s}
.pin-display:hover{background:rgba(0,212,255,.2)}
.btn-gen{font-size:.72rem;padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-gen:hover{border-color:var(--accent);color:var(--accent)}

/* ── MATCH CARDS ── */
.match-list-wrap{display:flex;flex-direction:column;gap:8px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;transition:all .2s;cursor:pointer;user-select:none}
.match-card:hover{border-color:rgba(0,212,255,.3)}
.match-card.dragging{opacity:.45;border:2px dashed var(--accent);transform:scale(.98)}
.match-card.drag-over{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(255,107,53,.25)}
.match-card.done{border-color:rgba(34,197,94,.3)}
.match-head{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.match-title{font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:8px}
.match-meta{display:flex;align-items:center;gap:8px}
.badge-sm{font-size:.68rem;padding:2px 8px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.badge-done{color:var(--win);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.badge-partial{color:var(--accent2);border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.08)}
.drag-grip{display:flex;flex-direction:column;gap:3px;padding:2px 4px;opacity:.4;cursor:grab}
.drag-grip span{display:flex;gap:3px}
.drag-grip i{width:3px;height:3px;border-radius:50%;background:var(--text);display:block}
.match-body{padding:10px 14px}
.game-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.game-label{font-size:.72rem;color:var(--muted);min-width:26px;font-weight:500}
.game-teams{flex:1;display:flex;align-items:center;gap:6px}
.player-chip{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:4px 7px;font-size:.72rem;color:var(--text);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-chip.empty{color:var(--muted);font-style:italic}
.vs-sm{font-size:.68rem;color:var(--muted);flex-shrink:0}
.score-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.score-box{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;
  font-size:.88rem;background:var(--surface2);color:var(--text)}
.score-box.s-win{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--win)}
.score-box.s-lose{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--lose)}
.ref-chip{font-size:.68rem;padding:2px 7px;border-radius:10px;border:1px solid;
  white-space:nowrap;flex-shrink:0;font-weight:600;}
.match-result{text-align:center;padding:5px 0 2px;font-size:.78rem;font-weight:700;
  border-top:1px solid var(--border);margin-top:4px}
.result-win{color:var(--win)}.result-lose{color:var(--lose)}.result-none{color:var(--muted)}
.order-status-row{display:flex;gap:6px;margin-bottom:7px}
.order-chip{flex:1;text-align:center;font-size:.7rem;padding:4px 6px;border-radius:7px;border:1px solid var(--border)}
.order-chip.submitted{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:var(--win)}
.order-chip.pending{background:rgba(100,116,139,.08);border-color:var(--border);color:var(--muted)}
.order-chip.revealed{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.3);color:var(--accent)}
.progress-bar-wrap{margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.progress-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--win));border-radius:3px;transition:width .4s}
.progress-text{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted)}

/* ── ORDER SHEET MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,14,26,.88);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:12px}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,0,0,.4)}
.modal-head{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:var(--surface);z-index:1}
.modal-head h3{font-family:'Black Han Sans',sans-serif;font-size:1rem;letter-spacing:1px}
.btn-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.btn-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:16px 18px}
.team-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.team-tab{flex:1;text-align:center;padding:8px;font-size:.82rem;font-weight:500;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
.team-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.game-section{margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px}
.game-sec-title{font-size:.78rem;font-weight:700;color:var(--accent2);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between}
.player-inputs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.player-input-wrap label{display:block;font-size:.68rem;color:var(--muted);margin-bottom:3px}
.player-input-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:6px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem;outline:none;transition:border-color .15s}
.player-input-wrap input:focus{border-color:var(--accent)}
.score-input-row{display:flex;align-items:center;gap:8px}
.score-input-row label{font-size:.72rem;color:var(--muted);min-width:36px}
.score-half{display:flex;align-items:center;gap:4px;flex:1}
.score-half span{font-size:.72rem;color:var(--muted);min-width:60px;font-weight:500}
.sinput{width:50px;background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:5px 6px;color:var(--text);font-family:'Black Han Sans',sans-serif;font-size:1rem;
  text-align:center;outline:none;-moz-appearance:textfield}
.sinput::-webkit-inner-spin-button,.sinput::-webkit-outer-spin-button{-webkit-appearance:none}
.sinput:focus{border-color:var(--accent)}
.reveal-section{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);
  border-radius:10px;padding:12px;margin-bottom:14px;text-align:center}
.reveal-section p{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.btn-reveal{padding:8px 20px;border-radius:8px;border:1px solid var(--accent);
  background:rgba(0,212,255,.1);color:var(--accent);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-reveal:hover{background:rgba(0,212,255,.2)}
.btn-reveal:disabled{opacity:.4;cursor:not-allowed}
.blurred{filter:blur(5px);user-select:none;pointer-events:none;transition:filter .3s}
.lock-notice{text-align:center;font-size:.75rem;color:var(--muted);padding:8px;
  background:var(--surface2);border-radius:8px;margin-top:8px}
.btn-submit{width:100%;padding:11px;border-radius:10px;border:none;margin-top:12px;
  background:linear-gradient(135deg,var(--accent),#0099bb);color:#fff;
  font-family:'Black Han Sans',sans-serif;font-size:.95rem;cursor:pointer;letter-spacing:1px;transition:all .2s}
.btn-submit:hover{opacity:.88}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;background:var(--surface2);color:var(--muted)}
.submitted-notice{text-align:center;padding:10px;background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.3);border-radius:8px;color:var(--win);font-size:.8rem;margin-top:8px}

/* ── STANDINGS ── */
.standings-table{width:100%;border-collapse:collapse;margin-top:6px}
.standings-table th{font-size:.72rem;color:var(--muted);font-weight:500;padding:6px 8px;
  border-bottom:1px solid var(--border);text-align:center}
.standings-table th:nth-child(2){text-align:left}
.standings-table td{padding:8px;text-align:center;border-bottom:1px solid var(--border);font-size:.82rem}
.standings-table td:nth-child(2){text-align:left}
.standings-table tr.qualified td{background:rgba(0,212,255,.04)}
.rank-badge{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;
  justify-content:center;font-size:.7rem;font-weight:700}
.rank-1{background:rgba(255,215,0,.2);color:var(--gold);border:1px solid rgba(255,215,0,.4)}
.rank-2{background:rgba(192,192,192,.2);color:var(--silver);border:1px solid rgba(192,192,192,.4)}
.rank-3{background:rgba(205,127,50,.2);color:var(--bronze);border:1px solid rgba(205,127,50,.4)}
.rank-other{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.stat-win{color:var(--win);font-weight:700}.stat-lose{color:var(--lose)}
.finalist-banner{display:flex;gap:10px;margin-bottom:14px}
.finalist-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.finalist-label{font-size:.7rem;color:var(--muted);margin-bottom:4px}
.finalist-name{font-family:'Black Han Sans',sans-serif;font-size:1.1rem}
.finalist-1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.04)}
.finalist-2{border-color:rgba(192,192,192,.3);background:rgba(192,192,192,.03)}
.qualified-label{font-size:.65rem;background:rgba(0,212,255,.1);color:var(--accent);
  border:1px solid rgba(0,212,255,.25);border-radius:8px;padding:1px 6px;margin-left:5px}
.empty-state{text-align:center;padding:30px;color:var(--muted);font-size:.88rem}

/* ── SAVE ── */
.save-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:14px}
.save-section h3{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.save-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.save-input{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;outline:none}
.save-input:focus{border-color:var(--accent)}
.saved-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.saved-item{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.saved-item-name{font-size:.8rem}.saved-item-meta{font-size:.68rem;color:var(--muted)}
.saved-btns{display:flex;gap:5px}
.btn-tiny{padding:3px 9px;border-radius:5px;font-size:.68rem;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);color:var(--text);transition:all .15s}
.btn-tiny:hover{border-color:var(--accent);color:var(--accent)}
.btn-tiny.danger:hover{border-color:var(--lose);color:var(--lose)}

/* ── GENERATE BTN ── */
.btn-generate{display:block;width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;
  background:linear-gradient(135deg,var(--accent),#0099bb);color:#fff;
  font-family:'Black Han Sans',sans-serif;font-size:1rem;cursor:pointer;letter-spacing:1px;transition:opacity .2s}
.btn-generate:hover{opacity:.88}

/* PIN EDITOR */
.pin-edit-overlay{position:fixed;inset:0;background:rgba(10,14,26,.88);z-index:300;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.pin-edit-overlay.hidden{display:none}
.pin-edit-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;
  width:min(300px,90vw);text-align:center}
.pin-edit-box h4{font-family:'Black Han Sans',sans-serif;font-size:.95rem;color:var(--accent);margin-bottom:6px}
.pin-edit-box p{font-size:.75rem;color:var(--muted);margin-bottom:14px}
.pin-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px;color:var(--text);font-family:'Black Han Sans',sans-serif;font-size:1.3rem;
  text-align:center;outline:none;letter-spacing:6px;-moz-appearance:textfield}
.pin-input::-webkit-inner-spin-button{-webkit-appearance:none}
.pin-input:focus{border-color:var(--accent)}
.pin-edit-btns{display:flex;gap:8px;margin-top:12px}

<body>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getDatabase, ref, onValue, set }
  from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAlXDYFR3XOgoQUCLcRJ9psd5hXfiY97yE",
  databaseURL: "https://changwon-badminton-2026-default-rtdb.europe-west1.firebasedatabase.app",
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// Firebase 함수를 window에 노출 (일반 script에서 호출 가능하게)
window._fbSet = (path, data) => set(ref(db, path), data);
window._fbListen = (path, cb) => onValue(ref(db, path), snap => cb(snap.val()));
</script>

<script>
/* ══════════════════════════════════════
   상수 / 기본값
══════════════════════════════════════ */
const COLORS=[
  {bg:'#00d4ff22',bd:'#00d4ff',tx:'#00d4ff'},{bg:'#ff6b3522',bd:'#ff6b35',tx:'#ff6b35'},
  {bg:'#a855f722',bd:'#a855f7',tx:'#a855f7'},{bg:'#22c55e22',bd:'#22c55e',tx:'#22c55e'},
  {bg:'#ffd70022',bd:'#ffd700',tx:'#ffd700'},{bg:'#f4366422',bd:'#f43664',tx:'#f43664'},
  {bg:'#38bdf822',bd:'#38bdf8',tx:'#38bdf8'},{bg:'#fb923c22',bd:'#fb923c',tx:'#fb923c'},
  {bg:'#a3e63522',bd:'#a3e635',tx:'#a3e635'},{bg:'#e879f922',bd:'#e879f9',tx:'#e879f9'},
  {bg:'#2dd4bf22',bd:'#2dd4bf',tx:'#2dd4bf'},{bg:'#6366f122',bd:'#6366f1',tx:'#6366f1'},
];
const DEF_NAMES=['안남','창북','감계','창덕','중앙','동원','명지','용지','반송','진해','웅천','마산'];

/* ══════════════════════════════════════
   Firebase 동기화 (module script가 준비된 후 호출)
══════════════════════════════════════ */
function setSyncState(state, txt){
  const dot=document.getElementById('sdot');
  const stxt=document.getElementById('stxt');
  if(dot) dot.className='sdot '+state;
  if(stxt) stxt.textContent=txt;
}
function syncToFb(){
  if(!window._fbSet){ return; }
  setSyncState('spin','저장 중...');
  window._fbSet('state', {
    matches, orders, adminPin, teamPins,
    teams: teams.slice(0, teamCount), teamCount
  }).then(()=>setSyncState('ok','저장됨'))
    .catch(e=>{ console.error(e); setSyncState('err','저장 실패'); });
}
function startSync(){
  setSyncState('spin','연결 중...');
  // module script가 로드될 때까지 잠시 대기
  const tryListen = () => {
    if(!window._fbListen){
      setTimeout(tryListen, 100); return;
    }
    window._fbListen('state', data=>{
      if(!data){ setSyncState('ok','연결됨'); return; }
      if(data.matches) matches=data.matches;
      if(data.orders) orders=data.orders;
      if(data.adminPin) adminPin=data.adminPin;
      if(data.teamPins) teamPins=data.teamPins;
      if(data.teams) teams=data.teams;
      if(data.teamCount) teamCount=data.teamCount;
      setSyncState('ok','실시간 연결됨');
      renderMatches(); renderStandings();
      if(document.getElementById('panel-setup').classList.contains('active')) initSetupUI();
    });
  };
  tryListen();
}

/* ══════════════════════════════════════
   상태
══════════════════════════════════════ */
let teamCount=5;
let teams=DEF_NAMES.slice(0,5);
let matches=[];
// 오더지: orders[matchId][teamIdx] = {players:[[p1a,p1b],[p2a,p2b],[p3a,p3b]], scores:[[s1,s2],[s1,s2],[s1,s2]], submitted, revealed}
let orders={};
let adminPin='0000';
let teamPins={}; // {teamIdx: '1234'}
let currentRole=null; // 'admin'|'team'|'viewer'
let currentTeamIdx=null;
let loginMode=null; // 'admin'|'team'
let pinBuffer='';
let dragSrcIdx=null;
let editingPinTarget=null; // 'admin' | teamIdx

/* ══════════════════════════════════════
   로그인
══════════════════════════════════════ */
function startLogin(type){
  if(type==='viewer'){
    currentRole='viewer'; currentTeamIdx=null;
    document.getElementById('loginOverlay').classList.add('hidden');
    applyRole(); return;
  }
  loginMode=type;
  document.getElementById('loginSelect').style.display='none';
  document.getElementById('pinSection').style.display='block';
  if(type==='admin'){
    document.getElementById('loginTitle').textContent='🔧 관리자 로그인';
    document.getElementById('loginTitle').style.color='var(--accent)';
    document.getElementById('loginSub').textContent='관리자 PIN 4자리';
  } else {
    document.getElementById('loginTitle').textContent='🏫 팀 PIN 입력';
    document.getElementById('loginTitle').style.color='var(--accent2)';
    document.getElementById('loginSub').textContent='팀 PIN 4자리를 입력하세요';
  }
  pinBuffer=''; updatePinDots(false);
}
function backToSelect(){
  document.getElementById('loginSelect').style.display='flex';
  document.getElementById('pinSection').style.display='none';
  document.getElementById('loginTitle').textContent='🏸 배드민턴 리그';
  document.getElementById('loginTitle').style.color='var(--accent)';
  document.getElementById('loginSub').textContent='접속 방식을 선택하세요';
  pinBuffer=''; updatePinDots(false);
  document.getElementById('pinError').textContent='';
}
function pkInput(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d; updatePinDots(false);
  if(pinBuffer.length===4) setTimeout(checkPin,150);
}
function pkDel(){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(false); document.getElementById('pinError').textContent=''; }
function updatePinDots(isTeam){
  for(let i=0;i<4;i++){
    const dot=document.getElementById('pd'+i);
    dot.classList.remove('filled','error','team-filled');
    if(i<pinBuffer.length) dot.classList.add(isTeam?'team-filled':'filled');
  }
}
function checkPin(){
  if(loginMode==='admin'){
    if(pinBuffer===adminPin){
      currentRole='admin'; currentTeamIdx=null;
      document.getElementById('loginOverlay').classList.add('hidden');
      applyRole();
    } else { showPinError(); }
  } else {
    // 팀 PIN 확인
    let found=-1;
    for(let i=0;i<teamCount;i++){
      if((teamPins[i]||String(i+1).padStart(4,'0'))===pinBuffer){ found=i; break; }
    }
    if(found>=0){
      currentRole='team'; currentTeamIdx=found;
      document.getElementById('loginOverlay').classList.add('hidden');
      applyRole();
    } else { showPinError(); }
  }
}
function showPinError(){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);d.classList.remove('filled','team-filled');d.classList.add('error');}
  document.getElementById('pinError').textContent='PIN이 올바르지 않습니다';
  setTimeout(()=>{ pinBuffer=''; updatePinDots(false); document.getElementById('pinError').textContent=''; },900);
}
function doLogout(){
  currentRole=null; currentTeamIdx=null; loginMode=null; pinBuffer='';
  backToSelect();
  document.getElementById('loginOverlay').classList.remove('hidden');
}
function applyRole(){
  const badge=document.getElementById('modeBadge');
  const tabSetup=document.getElementById('tab-setup');
  const tabSave=document.getElementById('tab-save');
  const myPinBtn=document.getElementById('myPinBtn');
  if(currentRole==='admin'){
    badge.textContent='🔧 관리자 모드'; badge.className='mode-badge admin';
    tabSetup.classList.remove('hidden'); tabSave.classList.remove('hidden');
    myPinBtn.style.display='none';
    document.body.classList.remove('view-only');
  } else if(currentRole==='team'){
    badge.textContent='🏫 '+teams[currentTeamIdx]; badge.className='mode-badge team';
    tabSetup.classList.add('hidden'); tabSave.classList.add('hidden');
    myPinBtn.style.display='inline-block';
    document.body.classList.add('view-only');
    showTab('matches');
  } else {
    badge.textContent='👁 관람 모드'; badge.className='mode-badge';
    tabSetup.classList.add('hidden'); tabSave.classList.add('hidden');
    myPinBtn.style.display='none';
    document.body.classList.add('view-only');
    showTab('matches');
  }
  renderMatches(); renderStandings();
}

/* ══════════════════════════════════════
   PIN 편집
══════════════════════════════════════ */
function openMyPinChange(){
  // 팀이 자기 PIN을 직접 변경
  if(currentRole!=='team') return;
  editingPinTarget = currentTeamIdx;
  document.getElementById('pinEditTitle').textContent = `내 팀 PIN 변경 (${teams[currentTeamIdx]})`;
  document.getElementById('pinEditSub').textContent = '새 PIN 4자리를 입력하세요. 변경 후 다음 로그인부터 적용됩니다.';
  document.getElementById('pinEditInput').value = '';
  document.getElementById('pinEditOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('pinEditInput').focus(), 100);
}
function editPin(target){
  if(currentRole!=='admin') return;
  editingPinTarget=target;
  const title=target==='admin'?'관리자 PIN 변경':`${teams[target]} 팀 PIN 변경`;
  document.getElementById('pinEditTitle').textContent=title;
  document.getElementById('pinEditSub').textContent='새 PIN 4자리 숫자를 입력하세요';
  document.getElementById('pinEditInput').value='';
  document.getElementById('pinEditOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('pinEditInput').focus(),100);
}
function closePinEdit(){ document.getElementById('pinEditOverlay').classList.add('hidden'); editingPinTarget=null; }
function savePinEdit(){
  const val=document.getElementById('pinEditInput').value.trim();
  if(!/^\d{4}$/.test(val)){ alert('4자리 숫자를 입력해주세요'); return; }
  if(editingPinTarget==='admin'){ adminPin=val; }
  else {
    teamPins[editingPinTarget]=val;
    if(currentRole==='team'){
      syncToFb();
      closePinEdit();
      alert(`✅ PIN이 변경됐습니다.\n다음 로그인부터 새 PIN(${val})을 사용하세요.`);
      return;
    }
  }
  syncToFb();
  closePinEdit();
  if(currentRole==='admin') renderTeamInputs();
}

/* ══════════════════════════════════════
   설정 UI
══════════════════════════════════════ */
function initSetupUI(){
  document.getElementById('teamCountDisp').textContent=teamCount;
  renderTeamInputs(); renderSavedList();
}
function changeTeamCount(d){
  teamCount=Math.min(12,Math.max(2,teamCount+d));
  while(teams.length<teamCount) teams.push(DEF_NAMES[teams.length]||'팀'+(teams.length+1));
  document.getElementById('teamCountDisp').textContent=teamCount;
  renderTeamInputs();
}
function renderTeamInputs(){
  const list=document.getElementById('teamList'); list.innerHTML='';
  for(let i=0;i<teamCount;i++){
    const c=COLORS[i%COLORS.length];
    const pin=teamPins[i]||String(i+1).padStart(4,'0');
    const row=document.createElement('div'); row.className='team-row';
    row.innerHTML=`<div class="team-badge" style="background:${c.bg};color:${c.tx};border:1px solid ${c.bd}">${i+1}</div>
      <input type="text" id="tn${i}" value="${teams[i]}" placeholder="팀 ${i+1}" maxlength="10">
      <span class="pin-display" onclick="editPin(${i})" title="PIN 변경">${pin}</span>`;
    list.appendChild(row);
  }
}
function readTeamNames(){
  teams=[];
  for(let i=0;i<teamCount;i++){
    const el=document.getElementById('tn'+i);
    teams.push(el?el.value.trim()||DEF_NAMES[i]||'팀'+(i+1):DEF_NAMES[i]||'팀'+(i+1));
  }
}

/* ══════════════════════════════════════
   대진 생성 (비연속 순서)
══════════════════════════════════════ */
function generate(){
  readTeamNames();
  buildLeague();
  orders={};
  updateHeaderSub();
  syncToFb();
  renderMatches(); renderStandings();
  showTab('matches');
}
function updateHeaderSub(){
  document.getElementById('headerSub').textContent=`복식 · ${teamCount}팀 풀리그 · 총 ${matches.length}경기`;
}

// 풀리그 대진 및 심판 배정 — 이미지 표 기준 고정
// 팀 인덱스: 안남=0, 창북=1, 감계=2, 창덕=3, 중앙(창원중앙)=4
// 심판 인덱스: refs[0]=1번 심판, refs[1]=2번 심판, refs[2]=3번 심판
function buildLeague(){
  // 기본 팀이 5개(안남,창북,감계,창덕,중앙)인 경우에만 고정 대진 사용
  // 팀 수가 다르면 랜덤 생성
  if(teamCount===5 &&
     teams[0].includes('안남') && teams[1].includes('창북') &&
     teams[2].includes('감계') && teams[3].includes('창덕') &&
     (teams[4].includes('중앙')||teams[4].includes('창원'))){
    buildFixedLeague();
  } else {
    buildRandomLeague();
  }
}

function buildFixedLeague(){
  // t1, t2: 대진 팀 인덱스
  // refs: [심판1팀인덱스, 심판2팀인덱스, 심판3팀인덱스]
  // refNames: [심판1담당자, 심판2담당자, 심판3담당자]
  const FIXED = [
    { t1:1, t2:2, refs:[3,0,4], refNames:['정현지','박성대','도현승'] }, // 창북 vs 감계
    { t1:3, t2:0, refs:[1,2,4], refNames:['이동주','박수환','도현승'] }, // 창덕 vs 안남
    { t1:1, t2:4, refs:[2,3,0], refNames:['박수환','정현지','박성대'] }, // 창북 vs 중앙
    { t1:2, t2:3, refs:[1,0,4], refNames:['이동주','박성대','도현승'] }, // 감계 vs 창덕
    { t1:0, t2:4, refs:[1,2,3], refNames:['이동주','박수환','정현지'] }, // 안남 vs 중앙
    { t1:1, t2:3, refs:[2,0,4], refNames:['박수환','박성대','도현승'] }, // 창북 vs 창덕
    { t1:2, t2:0, refs:[1,3,4], refNames:['이동주','정현지','도현승'] }, // 감계 vs 안남
    { t1:3, t2:4, refs:[1,2,0], refNames:['이동주','박수환','박성대'] }, // 창덕 vs 중앙
    { t1:1, t2:0, refs:[2,3,4], refNames:['박수환','정현지','도현승'] }, // 창북 vs 안남
    { t1:2, t2:4, refs:[1,3,0], refNames:['이동주','정현지','박성대'] }, // 감계 vs 중앙
  ];
  matches = FIXED.map((f, n) => ({
    id: n+1, t1: f.t1, t2: f.t2,
    score1:0, score2:0, played:false,
    referees: f.refs,
    refNames: f.refNames
  }));
}

function buildRandomLeague(){
  let pairs=[];
  for(let i=0;i<teamCount;i++)
    for(let j=i+1;j<teamCount;j++)
      pairs.push({t1:i,t2:j});
  pairs=shuffleNonConsecutive(pairs);
  matches=pairs.map((p,n)=>({id:n+1,t1:p.t1,t2:p.t2,score1:0,score2:0,played:false,referees:[]}));
  assignReferees();
}

function shuffleNonConsecutive(arr){
  for(let attempt=0;attempt<200;attempt++){
    const shuffled=[...arr].sort(()=>Math.random()-.5);
    let ok=true;
    for(let i=1;i<shuffled.length;i++){
      const prev=shuffled[i-1], cur=shuffled[i];
      if(cur.t1===prev.t1||cur.t1===prev.t2||cur.t2===prev.t1||cur.t2===prev.t2){ok=false;break;}
    }
    if(ok) return shuffled;
  }
  return arr.sort(()=>Math.random()-.5);
}

// 심판 배정: 각 경기의 3게임마다 제3팀 중 랜덤 배정
function assignReferees(){
  matches.forEach(m=>{
    // 참여하지 않는 팀 목록
    const others=[];
    for(let i=0;i<teamCount;i++){
      if(i!==m.t1&&i!==m.t2) others.push(i);
    }
    // 3게임에 랜덤 배정 (중복 최소화: 순서 섞어서 순서대로 배분)
    const shuffled=[...others].sort(()=>Math.random()-.5);
    const refs=[];
    for(let g=0;g<3;g++){
      refs.push(shuffled[g%shuffled.length]);
    }
    m.referees=refs;
  });
}

/* ══════════════════════════════════════
   오더지 헬퍼
══════════════════════════════════════ */
function getOrder(matchId, teamIdx){
  if(!orders[matchId]) orders[matchId]={};
  if(!orders[matchId][teamIdx]) orders[matchId][teamIdx]={
    players:[['',''],['',''],['','']],
    scores:[[null,null],[null,null],[null,null]],
    submitted:false, revealed:false
  };
  return orders[matchId][teamIdx];
}
function bothSubmitted(matchId){
  const m=matches.find(x=>x.id===matchId); if(!m) return false;
  return (orders[matchId]?.[m.t1]?.submitted) && (orders[matchId]?.[m.t2]?.submitted);
}
function isRevealed(matchId){ return orders[matchId]?.revealed===true; }
function revealOrders(matchId){
  if(!orders[matchId]) orders[matchId]={};
  orders[matchId].revealed=true;
  calcMatchResult(matchId);
  syncToFb();
  closeOrderModal();
  renderMatches(); renderStandings();
}
function calcMatchResult(matchId){
  const m=matches.find(x=>x.id===matchId); if(!m) return;
  if(!isRevealed(matchId)) return;
  let w1=0,w2=0;
  for(let g=0;g<3;g++){
    const o1=getOrder(matchId,m.t1), o2=getOrder(matchId,m.t2);
    const s1=o1.scores[g][0], s2=o1.scores[g][1]; // t1팀 오더지 기준 점수
    if(s1===null||s2===null) continue;
    if(s1>=21||s2>=21||s1>s2||s2>s1){ // 어느쪽이든 완료된 게임
      if(s1>s2) w1++; else w2++;
    }
  }
  m.score1=w1; m.score2=w2;
  m.played=(w1+w2)>=1; // 적어도 1게임 입력 시 집계 시작
  const totalDone = [0,1,2].every(g=>{
    const o=getOrder(matchId,m.t1);
    return o.scores[g][0]!==null && o.scores[g][1]!==null;
  });
  if(totalDone) m.played=true;
}

function renderMatches(){
  const list=document.getElementById('matchList'); list.innerHTML='';
  const done=matches.filter(m=>m.played).length;
  document.getElementById('progressText').textContent=done+' / '+matches.length;
  const pct=matches.length?Math.round(done/matches.length*100):0;
  document.getElementById('progressFill').style.width=pct+'%';

  matches.forEach((m,idx)=>{
    const c1=COLORS[m.t1%COLORS.length], c2=COLORS[m.t2%COLORS.length];
    const n1=teams[m.t1]||'팀'+(m.t1+1), n2=teams[m.t2]||'팀'+(m.t2+1);
    const rev=isRevealed(m.id);
    const sub1=orders[m.id]?.[m.t1]?.submitted||false;
    const sub2=orders[m.id]?.[m.t2]?.submitted||false;
    const both=sub1&&sub2;

    const card=document.createElement('div');
    card.className='match-card'+(m.played?' done':'');
    card.dataset.idx=idx;

    // 드래그 (관리자만)
    if(currentRole==='admin'){
      card.draggable=true;
      card.addEventListener('dragstart',onDragStart);
      card.addEventListener('dragover',onDragOver);
      card.addEventListener('drop',onDrop);
      card.addEventListener('dragend',onDragEnd);
    }

    // 게임 행 생성
    let gameRows='';
    for(let g=0;g<3;g++){
      const o1=orders[m.id]?.[m.t1];
      const o2=orders[m.id]?.[m.t2];
      const p1a=rev&&o1?o1.players[g][0]:'', p1b=rev&&o1?o1.players[g][1]:'';
      const p2a=rev&&o2?o2.players[g][0]:'', p2b=rev&&o2?o2.players[g][1]:'';
      const s1=rev&&o1?o1.scores[g][0]:null;
      const s2=rev&&o1?o1.scores[g][1]:null;
      const hasScore=s1!==null&&s2!==null;
      const gWin=(hasScore&&s1>s2)?'s-win':(hasScore&&s2>s1)?'s-lose':'';
      const gWin2=(hasScore&&s2>s1)?'s-win':(hasScore&&s1>s2)?'s-lose':'';
      const p1txt=p1a&&p1b?p1a+'·'+p1b:(p1a||p1b||'미입력');
      const p2txt=p2a&&p2b?p2a+'·'+p2b:(p2a||p2b||'미입력');
      // 심판
      const refIdx=m.referees?.[g];
      const refName=(refIdx!==undefined&&refIdx!==null)?teams[refIdx]:'?';
      const refPersonName=m.refNames?.[g]||'';
      const refColor=COLORS[refIdx%COLORS.length];
      gameRows+=`<div class="game-row">
        <span class="game-label">${g+1}번</span>
        <div class="game-teams">
          <div class="player-chip ${!p1a&&!p1b?'empty':''}" style="${rev&&(p1a||p1b)?'color:'+c1.tx:''}">${rev?p1txt:'미공개'}</div>
          <span class="vs-sm">vs</span>
          <div class="player-chip ${!p2a&&!p2b?'empty':''}" style="${rev&&(p2a||p2b)?'color:'+c2.tx:''}">${rev?p2txt:'미공개'}</div>
        </div>
        ${hasScore?`<div class="score-wrap">
          <div class="score-box ${gWin}">${s1}</div>
          <span class="vs-sm">-</span>
          <div class="score-box ${gWin2}">${s2}</div>
        </div>`:'<div class="score-wrap"><div class="score-box">-</div><span class="vs-sm">-</span><div class="score-box">-</div></div>'}
        <div class="ref-chip" style="color:${refColor.tx};border-color:${refColor.bd};background:${refColor.bg}" title="심판">🧑‍⚖️ ${refName}${refPersonName?'('+refPersonName+')':''}</div>
      </div>`;
    }

    // 오더지 제출 상태
    const chip1=sub1?'submitted':'pending';
    const chip2=sub2?'submitted':'pending';
    const revChip=rev?'revealed':'';

    // 결과
    let resultHTML='';
    if(rev&&m.played){
      if(m.score1>m.score2) resultHTML=`<div class="match-result result-win">🏆 ${n1} 승 (${m.score1}-${m.score2})</div>`;
      else if(m.score2>m.score1) resultHTML=`<div class="match-result result-win">🏆 ${n2} 승 (${m.score2}-${m.score1})</div>`;
      else resultHTML=`<div class="match-result result-none">진행 중</div>`;
    } else if(!rev) {
      resultHTML=`<div class="match-result result-none">${both?'양팀 제출 완료 — 공개 대기':'오더지 제출 대기 중'}</div>`;
    }

    card.innerHTML=`
      <div class="match-head">
        <div class="match-title">
          ${currentRole==='admin'?`<div class="drag-grip" title="드래그하여 순서 변경">
            <span><i></i><i></i></span><span><i></i><i></i></span><span><i></i><i></i></span>
          </div>`:''}
          <span style="color:${c1.tx}">${n1}</span>
          <span style="color:var(--muted);font-size:.75rem">vs</span>
          <span style="color:${c2.tx}">${n2}</span>
        </div>
        <div class="match-meta">
          <span class="badge-sm ${m.played?'badge-done':both?'badge-partial':''}">${m.played?'✅ 완료':both?'공개 대기':'⏳ 대기'}</span>
        </div>
      </div>
      <div class="match-body">
        <div class="order-status-row">
          <div class="order-chip ${chip1} ${revChip}">${n1} ${sub1?'✓ 제출':'미제출'}</div>
          <div class="order-chip ${chip2} ${revChip}">${n2} ${sub2?'✓ 제출':'미제출'}</div>
        </div>
        ${gameRows}
        ${resultHTML}
      </div>`;

    // 클릭 → 오더지 모달 (이벤트 버블링 방지 포함)
    card.querySelector('.match-body').addEventListener('click', function(e){
      e.stopPropagation();
      openOrderModal(m.id);
    });
    list.appendChild(card);
  });
}

function onDragStart(e){ dragSrcIdx=parseInt(e.currentTarget.dataset.idx); e.currentTarget.classList.add('dragging'); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDrop(e){
  e.preventDefault();
  const targetIdx=parseInt(e.currentTarget.dataset.idx);
  if(dragSrcIdx!==null&&dragSrcIdx!==targetIdx){
    [matches[dragSrcIdx],matches[targetIdx]]=[matches[targetIdx],matches[dragSrcIdx]];
    renderMatches();
  }
}
function onDragEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('drag-over')); dragSrcIdx=null; }

function openOrderModal(matchId){
  const m=matches.find(x=>x.id===matchId); if(!m) return;
  const n1=teams[m.t1], n2=teams[m.t2];
  document.getElementById('modalTitle').textContent=`${n1} vs ${n2} — 오더지`;
  document.getElementById('orderModal').classList.remove('hidden');
  renderModalBody(matchId);
}
function closeOrderModal(){
  document.getElementById('orderModal').classList.add('hidden');
}
// 모달 배경 클릭 시 닫기 (모달 내부 클릭은 버블링 차단)
document.getElementById('orderModal').addEventListener('click', function(e){
  if(e.target === this) closeOrderModal();
});
document.querySelector('#orderModal .modal').addEventListener('click', function(e){
  e.stopPropagation();
});

function renderModalBody(matchId){
  const m=matches.find(x=>x.id===matchId); if(!m) return;
  const n1=teams[m.t1], n2=teams[m.t2];
  const rev=isRevealed(matchId);
  const both=bothSubmitted(matchId);
  const body=document.getElementById('modalBody');

  // 관람자: 공개된 경우만 표시
  if(currentRole==='viewer'){
    if(!rev){ body.innerHTML=`<div class="empty-state">🔒 아직 오더지가 공개되지 않았습니다<br><small style="font-size:.72rem;color:var(--muted);margin-top:6px;display:block">양팀 제출 후 관리자가 공개합니다</small></div>`; return; }
    body.innerHTML=buildRevealedView(matchId,m);

  }

  // 관리자
  if(currentRole==='admin'){

    if(both&&!rev){
      html+=`<div class="reveal-section">
        <p>✅ 양팀 모두 오더지를 제출했습니다.<br>공개하면 양팀에게 오더지가 보입니다.</p>
        <button class="btn-reveal" onclick="revealOrders(${matchId})">🔓 오더지 공개</button>
      </div>`;
    } else if(!both){
      html+=`<div class="reveal-section"><p>${n1}: ${orders[matchId]?.[m.t1]?.submitted?'✅ 제출':'⏳ 미제출'} &nbsp;|&nbsp; ${n2}: ${orders[matchId]?.[m.t2]?.submitted?'✅ 제출':'⏳ 미제출'}</p></div>`;
    }
    // 공개 전에만 팀별 초기화 버튼 표시
    if(!rev){
      const sub1=orders[matchId]?.[m.t1]?.submitted||false;
      const sub2=orders[matchId]?.[m.t2]?.submitted||false;
      if(sub1||sub2){
        html+=`<div style="display:flex;gap:7px;margin-bottom:12px">`;

        if(sub2) html+=`<button class="btn-sm danger" style="flex:1;padding:8px;font-size:.78rem;border-radius:8px"

        // 공개 후 — 오더지 보기 + 심판 배정 게임 점수 입력
        let html = buildRevealedView(matchId, m);

        </div>

    const btn = document.getElementById('submitOrderBtn');
    if(btn){
      btn.addEventListener('click', function(){
        const ord = getOrder(matchId, myIdx);

        for(let g=0;g<3;g++){
          const p0 = (document.getElementById(`op_${g}_0`)?.value||'').trim();

          ord.players[g] = [p0, p1];
          if(p0||p1) anyName = true;
        }
        if(!anyName){ alert('선수 이름을 하나 이상 입력해주세요'); return; }
        if(!confirm('오더지를 제출하시겠습니까?\n제출 후에는 수정할 수 없습니다.')) return;
        ord.submitted = true;
        syncToFb();
        renderMatches();

      });
    }
    return;
  }
}

   순위표
══════════════════════════════════════ */
function calcLeagueStandings(){
  const stats = teams.slice(0,teamCount).map((name,i)=>({
    idx:i, name, color:COLORS[i%COLORS.length],
    wins:0, losses:0, draws:0, points:0, gameWin:0, gameLose:0
  }));

  matches.forEach(m=>{
    if(!m.played||!isRevealed(m.id)) return;
    // 개인 게임 득실 집계
    const o = orders[m.id]?.[m.t1];
    if(o){
      for(let g=0;g<3;g++){
        const s1=o.scores[g][0], s2=o.scores[g][1];
        if(s1===null||s2===null) continue;
        stats[m.t1].gameWin+=s1; stats[m.t1].gameLose+=s2;
        stats[m.t2].gameWin+=s2; stats[m.t2].gameLose+=s1;
      }
    }
    // 팀 승패
    if(m.score1>m.score2){
      stats[m.t1].wins++; stats[m.t2].losses++;
    } else if(m.score2>m.score1){
      stats[m.t2].wins++; stats[m.t1].losses++;
    } else {
      stats[m.t1].draws++; stats[m.t2].draws++;
    }
  });

  /* ── 승자승: 동률 그룹 내 직접 대결 전적만 따짐 ── */
  // 두 팀 간 직접 대결 승수 반환
  function h2hWins(aIdx, bIdx){
    const mx = matches.find(x =>
      x.played && isRevealed(x.id) &&
      ((x.t1===aIdx&&x.t2===bIdx)||(x.t1===bIdx&&x.t2===aIdx))
    );
    if(!mx) return 0;
    if(mx.t1===aIdx) return mx.score1>mx.score2?1:0;
    return mx.score2>mx.score1?1:0;
  }

  // 그룹 내 승자승 승수 합산 (3팀 이상도 정확히)
  function h2hGroupWins(targetIdx, groupIdxList){
    return groupIdxList.reduce((sum, oppIdx)=>{
      if(oppIdx===targetIdx) return sum;
      return sum + h2hWins(targetIdx, oppIdx);
    }, 0);
  }

  // 그룹 내 게임 득실차 (동률 그룹 팀들끼리의 경기만)
  function h2hGameDiff(targetIdx, groupIdxList){
    let gw=0, gl=0;
    matches.forEach(mx=>{
      if(!mx.played||!isRevealed(mx.id)) return;
      const involved = (mx.t1===targetIdx||mx.t2===targetIdx);
      const opp = mx.t1===targetIdx ? mx.t2 : mx.t1;
      if(!involved||!groupIdxList.includes(opp)) return;
      const o = orders[mx.id]?.[mx.t1];
      if(!o) return;
      for(let g=0;g<3;g++){
        const s1=o.scores[g][0], s2=o.scores[g][1];
        if(s1===null||s2===null) continue;
        if(mx.t1===targetIdx){ gw+=s1; gl+=s2; }
        else { gw+=s2; gl+=s1; }
      }
    });
    return gw - gl;
  }

  // 그룹 내 다득점 (동률 그룹 팀들끼리의 경기만)
  function h2hGameScored(targetIdx, groupIdxList){
    let gw=0;
    matches.forEach(mx=>{
      if(!mx.played||!isRevealed(mx.id)) return;
      const involved = (mx.t1===targetIdx||mx.t2===targetIdx);
      const opp = mx.t1===targetIdx ? mx.t2 : mx.t1;
      if(!involved||!groupIdxList.includes(opp)) return;
      const o = orders[mx.id]?.[mx.t1];
      if(!o) return;
      for(let g=0;g<3;g++){
        const s1=o.scores[g][0], s2=o.scores[g][1];
        if(s1===null||s2===null) continue;
        if(mx.t1===targetIdx) gw+=s1; else gw+=s2;
      }
    });
    return gw;
  }

  /* ── 1단계: 승수로 1차 정렬 ── */
  stats.sort((a,b)=> b.wins - a.wins);

  /* ── 2단계: 동률 그룹 내 세부 기준 적용 ── */
  // 동률 그룹을 찾아서 그룹 내 재정렬
  function resolveGroup(group){
    if(group.length<=1) return group;
    const idxList = group.map(s=>s.idx);

    // ① 그룹 내 승자승 승수
    group.sort((a,b)=>{
      const ha = h2hGroupWins(a.idx, idxList);
      const hb = h2hGroupWins(b.idx, idxList);
      if(hb!==ha) return hb-ha;

      // ② 그룹 내 득실차
      const da = h2hGameDiff(a.idx, idxList);
      const db = h2hGameDiff(b.idx, idxList);
      if(db!==da) return db-da;

      // ③ 그룹 내 다득점
      const sa = h2hGameScored(a.idx, idxList);
      const sb = h2hGameScored(b.idx, idxList);
      if(sb!==sa) return sb-sa;

      // ④ 전체 득실차
      const gda = a.gameWin - a.gameLose;
      const gdb = b.gameWin - b.gameLose;
      if(gdb!==gda) return gdb-gda;

      // ⑤ 전체 다득점
      return b.gameWin - a.gameWin;
    });

    // 재정렬 후 서브그룹이 여전히 완전 동률인지 확인 → 재경기 표시용 플래그
    // (승수·승자승·득실차·다득점 모두 같으면 playoff 필요)
    for(let i=0;i<group.length-1;i++){
      const a=group[i], b=group[i+1];
      const idxAB=[a.idx,b.idx];
      if(
        h2hGroupWins(a.idx,idxList)===h2hGroupWins(b.idx,idxList) &&
        h2hGameDiff(a.idx,idxList)===h2hGameDiff(b.idx,idxList) &&
        h2hGameScored(a.idx,idxList)===h2hGameScored(b.idx,idxList) &&
        (a.gameWin-a.gameLose)===(b.gameWin-b.gameLose) &&
        a.gameWin===b.gameWin
      ){
        a.playoff = true; b.playoff = true;
      }
    }
    return group;
  }

  // 승수 기준 동률 그룹 묶기 → 그룹별 해소
  const result=[];
  let i=0;
  while(i<stats.length){
    let j=i+1;
    while(j<stats.length && stats[j].wins===stats[i].wins) j++;
    const group = resolveGroup(stats.slice(i,j));
    result.push(...group);
    i=j;
  }

  return result;
}

function renderStandings(){
  const content=document.getElementById('standingsContent');
  const done=matches.filter(m=>m.played&&isRevealed(m.id)).length;
  if(done===0){ content.innerHTML='<div class="empty-state">아직 완료된 경기가 없습니다 🏸</div>'; return; }
  const stats=calcLeagueStandings();
  const qualCount=Math.min(2,teamCount);
  let html=`<div class="finalist-banner">`;
  const medals=['finalist-1','finalist-2'];
  const labels=['🥇 1위','🥈 2위'];
  for(let i=0;i<qualCount;i++){
    html+=`<div class="finalist-card ${medals[i]||''}">
      <div class="finalist-label">${labels[i]||(i+1)+'위'}</div>
      <div class="finalist-name" style="color:${i===0?'var(--gold)':'var(--silver)'}">${stats[i].name}</div>
      <div style="font-size:.68rem;color:var(--muted);margin-top:3px">${stats[i].wins}승 ${stats[i].losses}패 · ${stats[i].points}점</div>
    </div>`;
  }
  html+=`</div>
  <table class="standings-table"><thead><tr>
    <th>순위</th><th>팀명</th><th>승</th><th>패</th><th>무</th><th>득점</th><th>실점</th><th>득실</th>
  </tr></thead><tbody>`;
  const rc=['rank-1','rank-2','rank-3','rank-other'];
  stats.forEach((s,r)=>{
    const diff=s.gameWin-s.gameLose;
    const ds=diff>0?'+'+diff:''+diff;
    const playoffTag = s.playoff
      ? `<span style="font-size:.65rem;background:rgba(255,107,53,.15);color:var(--accent2);
          border:1px solid rgba(255,107,53,.35);border-radius:6px;padding:1px 6px;margin-left:4px">⚔️ 재경기</span>`
      : '';
    html+=`<tr${r<2?' class="qualified"':''}>
      <td><span class="rank-badge ${rc[r]||'rank-other'}">${r+1}</span></td>
      <td><span style="color:${s.color.tx};font-weight:700">${s.name}</span>${r<2?'<span class="qualified-label">도대표</span>':''}${playoffTag}</td>
      <td class="stat-win">${s.wins}</td><td class="stat-lose">${s.losses}</td>
      <td style="color:var(--muted);font-size:.82rem">${s.draws>0?s.draws+'무':'-'}</td>
      <td style="color:var(--win)">${s.gameWin}</td>
      <td style="color:var(--lose)">${s.gameLose}</td>
      <td style="color:${diff>=0?'var(--win)':'var(--lose)'}">${ds}</td>
    </tr>`;
  });
  html+=`</tbody></table>
  <div style="margin-top:8px;font-size:.7rem;color:var(--muted);padding:8px;background:var(--surface);border-radius:8px;border:1px solid var(--border)">
    📌 순위 기준: ① 승수 → ② 승자승(동률팀 간) → ③ 득실차(동률팀 간) → ④ 다득점(동률팀 간) → ⑤ 전체 득실차 → ⑥ 재경기<br>
    <span style="color:var(--accent2)">⚔️ 재경기</span> 표시 팀은 모든 기준이 동률 — 별도 재경기로 순위를 가립니다</div>`;
  content.innerHTML=html;
}

  if(currentRole!=='admin'){alert('관리자만 저장할 수 있습니다');return}
  const name=document.getElementById('saveNameInput').value.trim();
  if(!name){alert('저장 이름을 입력하세요');return}
  readTeamNames();
  const saves=getSaved();
  const data={name,date:new Date().toLocaleDateString('ko-KR'),teamCount,teams:[...teams],
    matches:JSON.parse(JSON.stringify(matches)),orders:JSON.parse(JSON.stringify(orders)),
    adminPin,teamPins:{...teamPins}};

function loadLeague(idx){
  const saves=getSaved(); const data=saves[idx]; if(!data)return;
  if(!confirm(`"${data.name}" 불러올까요?`))return;
  teamCount=data.teamCount; teams=[...data.teams];
  matches=JSON.parse(JSON.stringify(data.matches));
  orders=JSON.parse(JSON.stringify(data.orders||{}));
  adminPin=data.adminPin||adminPin;
  teamPins={...data.teamPins};
  updateHeaderSub(); initSetupUI(); renderMatches(); renderStandings(); showTab('matches');
}
function deleteLeague(idx){
  const saves=getSaved();
  if(!confirm(`"${saves[idx].name}" 삭제할까요?`))return;
  saves.splice(idx,1); setSaved(saves); renderSavedList();
}
function renderSavedList(){
  const saves=getSaved(); const el=document.getElementById('savedList'); if(!el)return;
  if(!saves.length){el.innerHTML='<div style="font-size:.75rem;color:var(--muted)">저장된 대진이 없습니다</div>';return}
  el.innerHTML='';
  saves.forEach((s,i)=>{
    const item=document.createElement('div'); item.className='saved-item';
    item.innerHTML=`<div><div class="saved-item-name">${s.name}</div><div class="saved-item-meta">${s.date} · ${s.teamCount}팀</div></div>
      <div class="saved-btns">
        <button class="btn-tiny" onclick="loadLeague(${i})">📂 불러오기</button>
        <button class="btn-tiny danger" onclick="deleteLeague(${i})">🗑</button>
      </div>`;
    el.appendChild(item);
  });
}

/* ══════════════════════════════════════
   탭 / 유틸
══════════════════════════════════════ */
function showTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='standings') renderStandings();
}

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
buildLeague();
updateHeaderSub();
initSetupUI();
renderMatches();
renderStandings();
startSync();

// 더블탭 줌 방지
let lastTap=0;
document.addEventListener('touchend',function(e){
  const now=Date.now();
  if(now-lastTap<300){e.preventDefault();}
  lastTap=now;
},{passive:false});

// 핀치 줌 방지
document.addEventListener('touchmove',function(e){
  if(e.touches.length>1) e.preventDefault();
},{passive:false});
</script>
